<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RightJob for スタートアップ｜体験型採用で採用ミスマッチを解消</title>
<meta name="description" content="少人数採用のミスマッチを体験型採用で解決。候補者に実務を疑似体験させ、思考力・判断力をAIが可視化。初期費用0円・最短2週間で導入。採用担当1名でも運用できるAI自動生成の体験型採用サービス。"/>
<meta property="og:title" content="RightJob for スタートアップ｜体験型採用で採用ミスマッチを解消"/>
<meta property="og:description" content="少人数採用のミスマッチを体験型採用で解決。候補者に実務を疑似体験させ、思考力・判断力をAIが可視化。初期費用0円・最短2週間で導入。採用担当1名でも運用できるAI自動生成の体験型採用サービス。"/>
<meta property="og:type" content="website"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans JP','sans-serif']},colors:{brand:'#0B3D91',action:'#1A73E8',cta:'#D45500',ok:'#1B7F4F',ink:'#1A1A2E'}}}}</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;}
html{scroll-behavior:smooth;}
.fade-in{animation:fadeIn .5s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-hover{transition:transform .2s,box-shadow .2s;}
.card-hover:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(11,61,145,.10);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease;}
.sticky-cta-pc{position:fixed;right:20px;bottom:80px;z-index:100;}
@media(max-width:768px){.sticky-cta-pc{display:none!important;}}
input[type=range]{accent-color:#1A73E8;}
@keyframes msgSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-anim{animation:msgSlide .35s ease both;}
@keyframes typing{0%,80%{opacity:.4}40%{opacity:1}}
.dot-1{animation:typing 1.2s infinite 0s;}
.dot-2{animation:typing 1.2s infinite .2s;}
.dot-3{animation:typing 1.2s infinite .4s;}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:.6}50%{transform:scale(1.2);opacity:.2}100%{transform:scale(.8);opacity:.6}}
.pulse-ring{animation:pulse-ring 2s ease-in-out infinite;}
</style>
</head>
<body class="bg-white">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const BRAND='#0B3D91',ACTION='#1A73E8',CTA_C='#D45500',OK='#1B7F4F',INK='#1A1A2E',BG='#F8FAFF';

const Ico={
  check:"M20 6L9 17l-5-5",arrow:"M5 12h14M12 5l7 7-7 7",chevR:"M9 18l6-6-6-6",
  play:"M5 3l14 9-14 9V3z",build:"M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z",
  bar:"M18 20V10M12 20V4M6 20v-6",x:"M18 6L6 18M6 6l12 12",
  down:"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
  phone:"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.6a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17.92z",
  shield:"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z",
  light:"M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6H8.3A7.4 7.4 0 0 1 5 9a7 7 0 0 1 7-7z",
  user:"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z",
  star:"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
  zap:"M13 2L3 14h9l-1 8 10-12h-9l1-8z",
  msg:"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z",
  brain:"M12 2a7 7 0 0 0-7 7c0 3 2 5.5 5 6.5V22h4v-6.5c3-1 5-3.5 5-6.5a7 7 0 0 0-7-7z",
  edit:"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
  target:"M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a4 4 0 1 1 4-4 4 4 0 0 1-4 4zm0-6a2 2 0 1 0 2 2 2 2 0 0 0-2-2z",
};
const I=(({d,size=20,color='currentColor',sw=2})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <path d={d}/>
  </svg>
));
const scrollTo=id=>{const e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});};

/* -- GAS Web App -- */
const GAS_URL='https://script.google.com/macros/s/AKfycbwGyiPYMCqbMXWmUgUqnCMZL1W70Lw8dyo9XPD91tVAoaxWn_6kQk-Ltqmy4nDOl24qTA/exec';

/* -- MODAL -- */
const Modal=(({onClose})=>{
  const [f,setF]=useState({company:'',name:'',dept:'',position:'',email:'',size:'',status:'',issues:'',privacy:false});
  const [sent,setSent]=useState(false);const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(false);
  const set=(k,v)=>setF(p=>(({...p,[k]:v})));
  const submit=e=>{
    e.preventDefault();setBusy(true);setErr(false);
    const payload=JSON.stringify({
      company:f.company,name:f.name,dept:f.dept,position:f.position,
      email:f.email,size:f.size,status:f.status,issues:f.issues,
      source:window.location.href
    });
    fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload})
      .then(()=>{setBusy(false);setSent(true);})
      .catch(()=>{setBusy(false);setErr(true);});
  };
  const inp="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-400 transition-colors";
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg relative" style={{maxHeight:'90vh',overflowY:'auto'}}>
        <div className="p-8">
          <button onClick={onClose} className="absolute top-5 right-5 w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center">
            <I d={Ico.x} size={14} color="#666"/>
          </button>
          {!sent?(
            <>
              <div className="mb-6">
                <div className="inline-block px-3 py-1 text-xs font-bold rounded-full bg-blue-50 text-blue-700 mb-3">資料請求・無料デモ申込</div>
                <h3 className="text-2xl font-black text-ink mb-2">まずは資料請求・無料デモを</h3>
                <p className="text-sm text-gray-500">担当者より2営業日以内にご連絡します。</p>
              </div>
              <form onSubmit={submit} className="space-y-4">
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="text-xs font-bold text-gray-500 block mb-1">会社名 <span className="text-red-500">*</span></label>
                    <input required value={f.company} onChange={e=>set('company',e.target.value)} placeholder="株式会社〇〇" className={inp}/></div>
                  <div><label className="text-xs font-bold text-gray-500 block mb-1">お名前 <span className="text-red-500">*</span></label>
                    <input required value={f.name} onChange={e=>set('name',e.target.value)} placeholder="山田 太郎" className={inp}/></div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="text-xs font-bold text-gray-500 block mb-1">所属部署</label>
                    <input value={f.dept} onChange={e=>set('dept',e.target.value)} placeholder="人事部" className={inp}/></div>
                  <div><label className="text-xs font-bold text-gray-500 block mb-1">役職</label>
                    <input value={f.position} onChange={e=>set('position',e.target.value)} placeholder="課長" className={inp}/></div>
                </div>
                <div><label className="text-xs font-bold text-gray-500 block mb-1">メールアドレス <span className="text-red-500">*</span></label>
                  <input required type="email" value={f.email} onChange={e=>set('email',e.target.value)} placeholder="taro@example.com" className={inp}/></div>
                <div className="grid grid-cols-2 gap-3">
                  <div><label className="text-xs font-bold text-gray-500 block mb-1">従業員規模 <span className="text-red-500">*</span></label>
                    <select required value={f.size} onChange={e=>set('size',e.target.value)} className={inp+' bg-white'}>
                      <option value="">選択してください</option>
                      {['1～50名','51～100名','101～300名','301～500名','501～1,000名','1,001名以上'].map(v=><option key={v}>{v}</option>)}
                    </select></div>
                  <div><label className="text-xs font-bold text-gray-500 block mb-1">検討状況 <span className="text-red-500">*</span></label>
                    <select required value={f.status} onChange={e=>set('status',e.target.value)} className={inp+' bg-white'}>
                      <option value="">選択してください</option>
                      {['具体的に導入を検討','まずは情報収集','その他'].map(v=><option key={v}>{v}</option>)}
                    </select></div>
                </div>
                <div><label className="text-xs font-bold text-gray-500 block mb-1">課題・ご要望</label>
                  <textarea value={f.issues} onChange={e=>set('issues',e.target.value)} rows={3}
                    placeholder="例：離職率が高い、採用後のミスマッチが多い…" className={inp+' resize-none'}/></div>
                <div className="flex items-start gap-3 p-4 bg-gray-50 rounded-xl">
                  <input required type="checkbox" id="prv" checked={f.privacy} onChange={e=>set('privacy',e.target.checked)} className="mt-0.5 w-4 h-4 accent-blue-600 flex-shrink-0"/>
                  <label htmlFor="prv" className="text-xs text-gray-500 leading-relaxed cursor-pointer">
                    <span className="text-red-500 font-bold">*</span> 入力情報はプライバシーポリシーに従い管理します。資料送付・デモ日程調整の目的のみに使用します。
                  </label>
                </div>
                {err&&<p className="text-red-500 text-sm text-center">送信に失敗しました。時間をおいて再度お試しください。</p>}
                <button type="submit" disabled={busy}
                  className="w-full py-4 text-white font-black text-base rounded-2xl shadow-lg transition-all hover:opacity-90 hover:scale-105 disabled:opacity-60"
                  style={{background:`linear-gradient(135deg,${BRAND},${ACTION})`}}>
                  {busy?'送信中...':'無料デモを申し込む →'}
                </button>
              </form>
            </>
          ):(
            <div className="text-center py-8">
              <div className="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <I d={Ico.check} size={32} color={OK} sw={2.5}/>
              </div>
              <h3 className="text-2xl font-black text-ink mb-3">お申し込みありがとうございます</h3>
              <p className="text-gray-500 text-sm mb-8">担当者より2営業日以内にご登録メールアドレスへご連絡いたします。</p>
              <button onClick={onClose} className="px-8 py-3 text-white font-bold rounded-xl" style={{background:BRAND}}>閉じる</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
});

/* -- HEADER -- */
const Header=(({onDemo})=>(
  <header className="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div className="flex justify-between items-center h-16">
        <div className="flex items-center gap-3">
          <span className="text-2xl font-black italic tracking-tight cursor-pointer" style={{color:BRAND}} onClick={()=>scrollTo('hero')}>RightJob</span>
          <span className="hidden sm:inline text-xs font-bold text-gray-400 border border-gray-200 rounded-full px-2 py-0.5">for 採用</span>
        </div>
        <nav className="hidden lg:flex gap-7 text-sm font-medium text-gray-600">
          {[['課題と背景','problem'],['特長','features'],['体験デモ','simpreview'],['料金プラン','pricing'],['よくある質問','faq']].map(([l,a])=>(
            <button key={a} className="hover:text-blue-600 transition-colors" onClick={()=>scrollTo(a)}>{l}</button>
          ))}
        </nav>
        <button onClick={onDemo} className="px-5 py-2.5 text-white text-sm font-bold rounded-xl transition-all hover:opacity-90 shadow" style={{backgroundColor:CTA_C}}>
          無料デモを申し込む
        </button>
      </div>
    </div>
  </header>
));

/* -- HERO -- */
const Hero=(({onDemo})=>(
  <section id="hero" className="py-16 lg:py-24 bg-white fade-in">
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div className="lg:grid lg:grid-cols-2 lg:gap-16 items-center">
        <div>
          <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold mb-6 bg-blue-50 text-blue-700">
            <I d={Ico.check} size={13}/>スタートアップ向け｜初期費用0円・AI自動生成・最短2週間導入
          </div>
          <h1 className="text-4xl sm:text-5xl lg:text-[3.25rem] font-black leading-tight mb-5 text-ink">
            採用担当1名でも、<br/>ミスマッチのない<br/>採用を実現する。
          </h1>
          <p className="text-lg text-gray-500 leading-relaxed mb-8 max-w-lg">少人数採用こそ、1名の早期離職が会社全体に響きます。候補者に実務を疑似体験させ、思考プロセスをAIが可視化する「ジョブシミュレーション型選考」で、カルチャーマッチを高め、定着率を変えましょう。</p>
          <div className="flex flex-col sm:flex-row gap-3 mb-4">
            <button onClick={onDemo}
              className="px-8 py-4 text-white text-base font-bold rounded-xl shadow-lg transition-all hover:opacity-90 hover:scale-105 flex items-center justify-center gap-2"
              style={{backgroundColor:CTA_C}}>
              無料デモを申し込む <I d={Ico.arrow} size={17} color="#fff"/>
            </button>
            <button onClick={()=>scrollTo('simpreview')}
              className="px-8 py-4 text-gray-700 bg-gray-50 border border-gray-200 text-base font-bold rounded-xl hover:bg-gray-100 flex items-center gap-2">
              <I d={Ico.play} size={16}/>体験デモを試す
            </button>
          </div>
          <p className="text-xs text-gray-400">※ 担当者より2営業日以内にご連絡します。費用は一切かかりません。</p>
          <div className="mt-10 inline-flex items-center gap-4 bg-white border border-gray-100 shadow-lg rounded-2xl px-5 py-3">
            <div className="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center">
              <I d={Ico.shield} size={18} color={OK}/>
            </div>
            <div>
              <div className="text-2xl font-black" style={{color:BRAND}}>約300万円</div>
              <div className="text-xs text-gray-400 font-bold">早期離職1名あたりの損失（業界試算）</div>
            </div>
          </div>
        </div>
        <div className="mt-12 lg:mt-0">
          <HeroChat/>
        </div>
      </div>
    </div>
  </section>
));

/* -- HERO CHAT VISUAL -- */
const HeroChat=(()=>{
  const [step,setStep]=useState(0);
  useEffect(()=>{
    if(step<5){const t=setTimeout(()=>setStep(s=>s+1),[0,1200,1800,2200,2800][step]||1500);return()=>clearTimeout(t);}
  },[step]);
  const msgs=[
    {from:'npc',name:'佐藤マネージャー',text:'お疲れ様。明日のクライアント向け提案書なんだけど、先方から急ぎで追加資料の要請が来ていて…。今日中に対応をお願いしたい。'},
    {from:'npc',name:'佐藤マネージャー',text:'ただ、今抱えている別案件の締切も近いよね。どう優先順位をつけるか、君の判断を聞かせてほしい。'},
    {from:'sys',text:'あなたならどう対応しますか？ 選択肢を選ぶか、自分の言葉で回答してください。'},
    {from:'user',text:'まず先方に確認を入れて、追加資料の具体的な範囲とデッドラインを明確にします。その上で…'},
    {from:'ai',text:'回答を分析中… 情報収集力・優先順位判断・コミュニケーション力を評価しています'},
  ];
  return(
    <div className="bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
      <div className="flex items-center gap-2 px-5 py-3 bg-gray-50 border-b border-gray-100">
        <div className="flex gap-1.5">
          {[CTA_C,'#F59E0B',OK].map((c,i)=><div key={i} className="w-3 h-3 rounded-full" style={{background:c}}/>)}
        </div>
        <div className="flex-1 mx-4 bg-white border border-gray-200 rounded-lg px-3 py-1 text-xs text-gray-400 text-center">
          <span className="inline-flex items-center gap-1"><I d={Ico.msg} size={10} color="#9CA3AF"/>ジョブシミュレーション体験中</span>
        </div>
      </div>
      <div className="p-5 space-y-3" style={{minHeight:320}}>
        {msgs.map((m,i)=>i<step&&(
          <div key={i} className={`msg-anim flex gap-2.5 ${m.from==='user'?'flex-row-reverse':''}`}>
            {m.from==='npc'&&<div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-black" style={{background:BRAND}}>佐</div>}
            {m.from==='user'&&<div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center bg-gray-200 text-gray-600 text-xs font-black">You</div>}
            {m.from==='ai'&&<div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-black" style={{background:OK}}>AI</div>}
            {m.from==='sys'&&<div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center bg-amber-100 text-amber-700 text-xs font-black">?</div>}
            <div className={`max-w-[80%] rounded-2xl px-4 py-2.5 text-xs leading-relaxed ${
              m.from==='user'?'bg-blue-500 text-white':
              m.from==='ai'?'bg-green-50 border border-green-200 text-green-800':
              m.from==='sys'?'bg-amber-50 border border-amber-200 text-amber-800':
              'bg-gray-100 text-gray-700'
            }`}>
              {m.name&&<div className="text-xs font-black mb-1 opacity-70">{m.name}</div>}
              {m.text}
            </div>
          </div>
        ))}
        {step<5&&step>0&&(
          <div className="flex gap-2.5">
            <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-white text-xs font-black" style={{background:step<3?BRAND:step===3?'#9CA3AF':OK}}>
              {step<3?'佐':step===3?'...':'AI'}
            </div>
            <div className="bg-gray-100 rounded-2xl px-4 py-3 flex items-center gap-1">
              <div className="w-2 h-2 rounded-full bg-gray-400 dot-1"/>
              <div className="w-2 h-2 rounded-full bg-gray-400 dot-2"/>
              <div className="w-2 h-2 rounded-full bg-gray-400 dot-3"/>
            </div>
          </div>
        )}
      </div>
      <div className="px-5 pb-4">
        <div className="flex items-center gap-2 bg-gray-50 rounded-xl px-4 py-3 border border-gray-200">
          <I d={Ico.edit} size={14} color="#9CA3AF"/>
          <span className="text-xs text-gray-400 flex-1">自分の言葉で回答を入力...</span>
          <div className="px-3 py-1.5 rounded-lg text-xs font-bold text-white" style={{background:ACTION}}>送信</div>
        </div>
      </div>
    </div>
  );
});

/* -- TRUST BAR -- */
const TrustBar=(()=>(
  <section className="py-10 bg-white border-t border-b border-gray-100">
    <div className="max-w-6xl mx-auto px-4">
      <p className="text-center text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">先行導入パートナー企業 業種・規模</p>
      <div className="flex flex-wrap justify-center items-stretch gap-4">
        {[
          {icon:Ico.light,color:'#0B3D91',title:'コンサルティング企業',sub:'ケース面接の代替に活用'},
          {icon:Ico.zap,  color:'#1A1A2E',title:'IT・SaaS企業',        sub:'技術判断力の可視化に'},

                  <p className="text-sm font-bold text-gray-700 mb-4">実際のチャット体験をデモで試してみませんか？</p>
                  <button onClick={onDemo} className="px-8 py-3 text-white font-bold rounded-xl text-sm shadow transition-all hover:opacity-90 hover:scale-105" style={{background:ACTION}}>
                    無料デモを申し込む →
                  </button>
                </div>
              )}
            </React.Fragment>
          ))}
        </div>
      </div>
    </section>
  );
}));

/* -- FOOTER CTA -- */
const FooterCTA=((({onDemo})=>(
  <section className="py-24 text-white text-center" style={{background:`linear-gradient(135deg,${BRAND} 0%,${ACTION} 100%)`}}>
    <div className="max-w-3xl mx-auto px-4">
      <div className="inline-flex items-center gap-2 px-4 py-2 bg-white/20 rounded-full text-sm font-bold mb-8">
        <I d={Ico.shield} size={15} color="#fff"/>初期費用0円・最短2週間で導入開始
      </div>
      <h2 className="text-4xl font-black mb-6 leading-tight">採用担当1名でも、<br/>ミスマッチのない採用へ。</h2>
      <p className="text-white/70 mb-10 text-lg">実務の疑似体験×AI思考分析で、候補者の本質を引き出す新しい採用体験。初期費用0円・最短2週間で導入できます。</p>
      <div className="flex flex-col sm:flex-row justify-center gap-4">
        <button onClick={onDemo} className="px-10 py-5 bg-white font-black text-lg rounded-2xl shadow-xl transition-all hover:scale-105" style={{color:BRAND}}>
          無料デモを申し込む
        </button>
        <button onClick={()=>scrollTo('simpreview')} className="px-10 py-5 bg-transparent border-2 border-white/40 text-white font-bold text-lg rounded-2xl transition-all hover:bg-white/10">

        </button>
      </div>

      <p className="mt-10 text-white/40 text-xs">&copy; 2026 RightJob Inc. All Rights Reserved.</p>
    </div>
  </section>
)));

/* -- FLOATING CTA -- */
const FloatCTA=((({show,onDemo})=>(
  <>
    <div className="fixed bottom-4 left-4 right-4 z-40 md:hidden">
      <button onClick={onDemo} className="w-full py-4 text-white font-bold rounded-full shadow-2xl flex items-center justify-center gap-2" style={{background:CTA_C}}>
        デモを予約する <I d={Ico.chevR} size={18} color="#fff"/>
      </button>
    </div>
    {show&&(
      <div className="sticky-cta-pc">
        <button onClick={onDemo} className="flex flex-col items-center gap-2 px-4 py-5 text-white font-bold rounded-2xl shadow-2xl transition-all hover:scale-105"
          style={{background:`linear-gradient(180deg,${BRAND},${ACTION})`}}>
          <I d={Ico.phone} size={22} color="#fff" sw={2}/>
          <span className="text-xs font-black tracking-wide" style={{writingMode:'vertical-rl',textOrientation:'mixed'}}>
            デモを予約する
          </span>
        </button>
      </div>
    )}
  </>
)));

/* -- APP -- */
const App=(()=>{
  const [modal,setModal]=useState(false);
  const [showF,setShowF]=useState(false);
  useEffect(()=>{
    const fn=()=>setShowF(window.scrollY>400);
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
  return(
    <div className="min-h-screen bg-white overflow-x-hidden">
      <Header onDemo={()=>setModal(true)}/>
      <main className="fade-in">
        <Hero onDemo={()=>setModal(true)}/>
        <TrustBar/>
        <Problem/>
        <Features/>
        <Steps onDemo={()=>setModal(true)}/>
        <SimPreview/>
        <ROICalc onDemo={()=>setModal(true)}/>
        <Pricing onDemo={()=>setModal(true)}/>
        <Onboarding/>
        <Voice/>
        <FAQ onDemo={()=>setModal(true)}/>
        <FooterCTA onDemo={()=>setModal(true)}/>
      </main>
      <FloatCTA show={showF} onDemo={()=>setModal(true)}/>
      {modal&&<Modal onClose={()=>setModal(false)}/>}
    </div>
  );
});

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
